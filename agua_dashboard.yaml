          const consumoHora = n('sensor.consumo_ultima_hora_estanque_botacura');
          const totalDia = n('sensor.consumo_diario_estanque_botacura');

          const item = (titulo, valor, color) => `
            <div style="
              background:rgba(255,255,255,0.045);
              border:1px solid rgba(255,255,255,0.07);
              border-radius:18px;
              padding:16px;
              min-height:88px;
              display:flex;
              flex-direction:column;
              justify-content:center;
              align-items:center;
              text-align:center;
            ">
              <div style="font-size:13px; color:#94a3b8; font-weight:700;">${titulo}</div>
              <div style="font-size:24px; color:${color}; font-weight:900; line-height:1.1; margin-top:4px;">
                ${valor}
              </div>
            </div>
          `;

          return `
            <div style="width:100%; text-align:center;">
              <div style="font-size:27px; font-weight:900; color:#f8fafc;">
                Contador por nivel del estanque
              </div>
              <div style="font-size:15px; color:#94a3b8; margin-top:5px; margin-bottom:18px;">
                Guarda nivel a las 00:00 y compara litros cada 60 minutos
              </div>

              <div style="
                display:grid;
                grid-template-columns:repeat(7, 1fr);
                gap:12px;
                width:100%;
              ">
                ${item('Litros actuales', actual.toLocaleString('es-CL') + ' L', '#38bdf8')}
                ${item('Inicio del día', inicio.toLocaleString('es-CL') + ' L', '#60a5fa')}
                ${item('Lectura anterior', anterior.toLocaleString('es-CL') + ' L', '#c084fc')}
                ${item('Ingreso 1h', ingreso.toLocaleString('es-CL') + ' L', '#38bdf8')}
                ${item('Aumento neto', aumento.toLocaleString('es-CL') + ' L', '#86efac')}
                ${item('Consumo 1h', consumoHora.toLocaleString('es-CL') + ' L', '#f97316')}
                ${item('Total día', totalDia.toLocaleString('es-CL') + ' L', '#c084fc')}
              </div>
            </div>
          `;
        ]]]
