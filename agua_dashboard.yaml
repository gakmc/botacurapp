  - type: grid
    columns: 3
    square: false
    cards:
      - type: custom:apexcharts-card
        header:
          show: true
          title: Agua ingresada por hora
          show_states: true
        graph_span: 24h
        span:
          end: hour
        apex_config:
          chart:
            height: 300
            toolbar:
              show: false
            background: transparent
          theme:
            mode: dark
          legend:
            position: bottom
            horizontalAlign: center
          dataLabels:
            enabled: false
          grid:
            borderColor: rgba(148,163,184,0.18)
        series:
          - entity: sensor.agua_ingresada_ultima_hora_estanque_botacura
            name: Ingreso por hora
            type: column
            color: "#38bdf8"
            unit: L
