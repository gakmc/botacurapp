          };

          const actual = n('sensor.litros_estanque_botacura_corregido');
          const inicio = n('input_number.litros_inicio_dia_estanque_botacura');
          const anterior = n('input_number.litros_lectura_anterior_estanque_botacura');
          const ingreso = n('sensor.agua_ingresada_ultima_hora_estanque_botacura');
