# ============================================================
# Home Assistant — Gas Casa y Cocina
# AGREGAR en /config/automations.yaml (al final del archivo)
# ============================================================
# Helpers ya creados via API (no necesitas crearlos):
#   input_datetime.gas_casa_fecha_instalacion_actual
#   input_datetime.gas_casa_fecha_instalacion_anterior
#   input_datetime.gas_cocina_fecha_instalacion_actual
#   input_datetime.gas_cocina_fecha_instalacion_anterior
#   input_number.gas_casa_dias_cilindro_anterior
#   input_number.gas_cocina_dias_cilindro_anterior
#   input_number.gas_casa_kg_cilindro
#   input_number.gas_cocina_kg_cilindro
#   input_button.gas_nuevo_casa
#   input_button.gas_nuevo_cocina
# ============================================================

- alias: "Gas nuevo Casa – registrar instalación"
  id: gas_nuevo_casa_registrar
  description: "Al presionar botón gas nuevo casa: calcula días del cilindro anterior y registra nueva instalación vía API"
  mode: single
  trigger:
    - platform: state
      entity_id: input_button.gas_nuevo_casa
  action:
    # 1. Guardar fecha actual como anterior
    - service: input_datetime.set_datetime
      target:
        entity_id: input_datetime.gas_casa_fecha_instalacion_anterior
      data:
        datetime: "{{ states('input_datetime.gas_casa_fecha_instalacion_actual') }}"

    # 2. Calcular y guardar días que duró el cilindro anterior
    - service: input_number.set_value
      target:
        entity_id: input_number.gas_casa_dias_cilindro_anterior
      data:
        value: >
          {% set fa = states('input_datetime.gas_casa_fecha_instalacion_actual') %}
          {% if fa not in ['unknown','unavailable','',none] %}
            {{ ((as_timestamp(now()) - as_timestamp(fa)) / 86400) | round(0) }}
          {% else %}
            0
          {% endif %}

    # 3. Registrar nueva fecha de instalación
    - service: input_datetime.set_datetime
      target:
        entity_id: input_datetime.gas_casa_fecha_instalacion_actual
      data:
        datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"

    # 4. Registrar en API botacura (requiere rest_command configurado abajo)
    - service: rest_command.registrar_instalacion_gas
      data:
        lugar: "gas_casa"
        fecha_instalacion: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
        contador_valor: "{{ states('input_number.gas_casa_dias_cilindro_anterior') }}"
        contador_unidad: "dias"
        kg_cilindro: "{{ states('input_number.gas_casa_kg_cilindro') }}"


