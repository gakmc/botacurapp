# ============================================================
# Home Assistant – Formulario Compra de Gas (Tarea #15)
# ============================================================
# INSTRUCCIONES:
#   1. Copia los bloques input_text / input_number / input_button
#      en tu configuration.yaml (o en el archivo que incluyes).
#   2. Copia el bloque "automation:" al final de automations.yaml
#   3. El rest_command ya existe en home_assistant_gas_sensores.yaml
#   4. Reinicia HA para que tome los cambios.
# ============================================================

# ── HELPERS: FORMULARIO COMPRA ────────────────────────────────
# Estos helpers sirven como "campos de formulario" en el dashboard.
# El usuario los llena y luego presiona el botón de registrar.

input_text:
  gas_compra_proveedor:
    name: "Gas Compra – Proveedor"
    max: 150
    icon: mdi:account-hard-hat

  gas_compra_documento:
    name: "Gas Compra – N° Documento / Boleta"
    max: 120
    icon: mdi:file-document-outline

  gas_compra_observacion:
    name: "Gas Compra – Observación"
    max: 255
    icon: mdi:note-text-outline

input_number:
  gas_compra_valor_cilindro:
    name: "Gas Compra – Valor por cilindro ($)"
    min: 1000
    max: 50000
    step: 100
    unit_of_measurement: "CLP"
    icon: mdi:cash

  gas_compra_cantidad_cilindros:
    name: "Gas Compra – Cantidad de cilindros"
    min: 1
    max: 20
    step: 1
    icon: mdi:propane-tank

  gas_compra_kg_cilindro:
    name: "Gas Compra – Kg por cilindro"
    min: 5
    max: 45
    step: 0.5
    unit_of_measurement: "kg"
    icon: mdi:weight-kilogram

input_datetime:
  gas_compra_fecha:
    name: "Gas Compra – Fecha de compra"
    has_date: true
    has_time: false
    icon: mdi:calendar

input_button:
  gas_registrar_compra:
    name: "Registrar compra de gas"
    icon: mdi:send-circle

  # Botones para instalación de gas_casa y gas_cocina
  # (alternativa a webhook para facilitar uso desde dashboard)
  gas_nuevo_casa:
    name: "Gas nuevo – Casa"
    icon: mdi:propane-tank

  gas_nuevo_cocina:
    name: "Gas nuevo – Cocina"
    icon: mdi:propane-tank

# ── SENSORES: total y resumen de la compra ───────────────────

template:
  - sensor:
      - name: "Gas Compra – Total estimado"
        unique_id: gas_compra_total_estimado
        unit_of_measurement: "CLP"
        icon: mdi:cash-multiple
        state: >
          {% set v = states('input_number.gas_compra_valor_cilindro') | float(0) %}
          {% set c = states('input_number.gas_compra_cantidad_cilindros') | float(0) %}
          {{ (v * c) | round(0) | int }}

# ── AUTOMATIONS ───────────────────────────────────────────────

automation:

  # ── COMPRA: al presionar "Registrar compra de gas" ───────────
  - alias: "Gas – Registrar compra al proveedor"
    id: gas_registrar_compra_proveedor
    description: "Lee helpers del formulario y llama a la API de Botacura para registrar la compra"
    mode: single
    trigger:
      - platform: state
        entity_id: input_button.gas_registrar_compra
    action:
      - service: rest_command.registrar_compra_gas
        data:
          proveedor: "{{ states('input_text.gas_compra_proveedor') }}"
          fecha_compra: "{{ states('input_datetime.gas_compra_fecha') }}"
          valor_cilindro: "{{ states('input_number.gas_compra_valor_cilindro') | int }}"
          cantidad_cilindros: "{{ states('input_number.gas_compra_cantidad_cilindros') | int }}"
          kg_cilindro: "{{ states('input_number.gas_compra_kg_cilindro') | float }}"
          documento: "{{ states('input_text.gas_compra_documento') }}"
          observacion: "{{ states('input_text.gas_compra_observacion') }}"

      # Notificación de confirmación
      - service: persistent_notification.create
        data:
          title: "✅ Compra de gas registrada"
          message: >
            Proveedor: {{ states('input_text.gas_compra_proveedor') }}
            Cilindros: {{ states('input_number.gas_compra_cantidad_cilindros') | int }}
            Valor: ${{ states('input_number.gas_compra_valor_cilindro') | int | string }} c/u
            Total: ${{ states('sensor.gas_compra_total_estimado') }}
            Fecha: {{ states('input_datetime.gas_compra_fecha') }}
          notification_id: gas_compra_ok

      # Limpiar campos del formulario
      - service: input_text.set_value
        target:
          entity_id: input_text.gas_compra_proveedor
        data:
          value: ""
      - service: input_text.set_value
        target:
          entity_id: input_text.gas_compra_documento
        data:
          value: ""
      - service: input_text.set_value
        target:
          entity_id: input_text.gas_compra_observacion
        data:
          value: ""
      - service: input_number.set_value
        target:
          entity_id: input_number.gas_compra_cantidad_cilindros
        data:
          value: 1

  # ── GAS NUEVO CASA: botón → API + actualizar fechas ──────────
  - alias: "Gas nuevo Casa – registrar instalación (botón)"
    id: gas_nuevo_casa_boton
    description: "Copia fecha actual a anterior, guarda días duración y llama a la API"
    mode: single
    trigger:
      - platform: state
        entity_id: input_button.gas_nuevo_casa
    action:
      # Guardar fecha actual → anterior
      - service: input_datetime.set_datetime
        target:
          entity_id: input_datetime.gas_casa_fecha_anterior
        data:
          datetime: "{{ states('input_datetime.gas_casa_fecha_actual') }}"

      # Guardar días duración del cilindro que termina
      - service: input_number.set_value
        target:
          entity_id: input_number.gas_casa_dias_ultimo_cilindro
        data:
          value: >
            {% set f = states('input_datetime.gas_casa_fecha_actual') %}
            {% if f not in ['unknown','unavailable','',none] %}
              {{ ((as_timestamp(now()) - as_timestamp(f)) / 86400) | round(0) | int }}
            {% else %}
              0
            {% endif %}

      # Registrar nueva fecha de instalación
      - service: input_datetime.set_datetime
        target:
          entity_id: input_datetime.gas_casa_fecha_actual
        data:
          datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"

      # Llamar a la API
      - service: rest_command.registrar_instalacion_gas
        data:
          lugar: "gas_casa"
          fecha_instalacion: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
          contador_valor: "{{ states('sensor.gas_casa_dias_en_uso_actual') | default(0) }}"
          contador_unidad: "dias"

      - service: persistent_notification.create
        data:
          title: "✅ Gas Casa registrado"
          message: "Nuevo cilindro instalado. El anterior duró {{ states('input_number.gas_casa_dias_ultimo_cilindro') | int }} días."
          notification_id: gas_nuevo_casa_ok

  # ── GAS NUEVO COCINA: botón → API + actualizar fechas ────────
  - alias: "Gas nuevo Cocina – registrar instalación (botón)"
    id: gas_nuevo_cocina_boton
    description: "Copia fecha actual a anterior, guarda días duración y llama a la API"
    mode: single
    trigger:
      - platform: state
        entity_id: input_button.gas_nuevo_cocina
    action:
      - service: input_datetime.set_datetime
        target:
          entity_id: input_datetime.gas_cocina_fecha_anterior
        data:
          datetime: "{{ states('input_datetime.gas_cocina_fecha_actual') }}"

      - service: input_number.set_value
        target:
          entity_id: input_number.gas_cocina_dias_ultimo_cilindro
        data:
          value: >
            {% set f = states('input_datetime.gas_cocina_fecha_actual') %}
            {% if f not in ['unknown','unavailable','',none] %}
              {{ ((as_timestamp(now()) - as_timestamp(f)) / 86400) | round(0) | int }}
            {% else %}
              0
            {% endif %}

      - service: input_datetime.set_datetime
        target:
          entity_id: input_datetime.gas_cocina_fecha_actual
        data:
          datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"

      - service: rest_command.registrar_instalacion_gas
        data:
          lugar: "gas_cocina"
          fecha_instalacion: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
          contador_valor: "{{ states('sensor.gas_cocina_dias_en_uso_actual') | default(0) }}"
          contador_unidad: "dias"

      - service: persistent_notification.create
        data:
          title: "✅ Gas Cocina registrado"
          message: "Nuevo cilindro instalado. El anterior duró {{ states('input_number.gas_cocina_dias_ultimo_cilindro') | int }} días."
          notification_id: gas_nuevo_cocina_ok
