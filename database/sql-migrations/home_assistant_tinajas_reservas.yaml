# ==============================================================================
# HOME ASSISTANT — Próxima reserva Tinajas + Encendido automático calefacción
# ==============================================================================
# Generado por BotacurApp el 2026-06-24
#
# INSTRUCCIONES DE INSTALACIÓN:
# ─────────────────────────────
# 1. Agrega el bloque `rest:` en /config/configuration.yaml
# 2. Agrega el bloque `template:` en /config/configuration.yaml
# 3. Copia las automatizaciones al final de /config/automations.yaml
# 4. En HA: Configuración → Servidor → Reiniciar HA para aplicar cambios
# 5. El control automático está DESACTIVADO por defecto.
#    Para activarlo: input_boolean.tinajas_control_activo → ON
#
# PREREQUISITO:
#   Despliega el nuevo endpoint en producción antes de activar:
#   GET https://app.botacura.cl/api/iot/tinajas/proxima-reserva
#
# Para pruebas locales (antes de deployar), reemplaza la URL por:
#   http://192.168.100.TU_IP_PC/botacurapp/public/api/iot/tinajas/proxima-reserva
# ==============================================================================


# ==============================================================================
# SECCIÓN 1 — Agrega en /config/configuration.yaml
# ==============================================================================

# ── REST Sensor: consulta API cada 5 minutos ──────────────────────────────────
rest:
  - resource: "https://app.botacura.cl/api/iot/tinajas/proxima-reserva"
    scan_interval: 300
    sensor:
      - name: "Reservas Tinajas"
        unique_id: reservas_tinajas_api
        value_template: "{{ value_json.ok }}"
        json_attributes:
          - tinaja_1
          - tinaja_2
          - sauna
          - masaje_container
          - masaje_palmeras
          - consultado_en

# ── Template Sensors: extrae datos de T1 y T2 ────────────────────────────────
template:
  - sensor:
      # --- Tinaja 1 ---
      - name: "Próxima Reserva T1 Horario"
        unique_id: proxima_reserva_t1_horario
        icon: mdi:hot-tub
        state: >
          {% set t1 = state_attr('sensor.reservas_tinajas', 'tinaja_1') %}
          {{ t1.horario if t1 else 'Sin reserva' }}

      - name: "Próxima Reserva T1 Cliente"
        unique_id: proxima_reserva_t1_cliente
        icon: mdi:account
        state: >
          {% set t1 = state_attr('sensor.reservas_tinajas', 'tinaja_1') %}
          {{ t1.cliente if t1 else '-' }}

      - name: "Próxima Reserva T1 Datetime"
        unique_id: proxima_reserva_t1_datetime
        state: >
          {% set t1 = state_attr('sensor.reservas_tinajas', 'tinaja_1') %}
          {{ t1.datetime_reserva if t1 else 'unknown' }}

      - name: "Minutos para calentar T1"
        unique_id: minutos_calentar_t1
        unit_of_measurement: "min"
        icon: mdi:timer-sand
        state: >
          {% set temp_actual   = states('sensor.sonoff_a440041249_temperature') | float(15) %}
          {% set temp_objetivo = states('input_number.temperatura_objetivo_tinaja_1') | float(38) %}
          {% set min_por_grado = states('input_number.promedio_minutos_por_grado_tinaja_1') | float(7) %}
          {% set grados = [temp_objetivo - temp_actual, 0] | max %}
          {{ (grados * min_por_grado) | round(0) | int }}

      - name: "Hora encendido calculada T1"
        unique_id: hora_encendido_calculada_t1
        icon: mdi:clock-start
        state: >
          {% set t1 = state_attr('sensor.reservas_tinajas', 'tinaja_1') %}
          {% if t1 %}
            {% set dt_reserva = strptime(t1.datetime_reserva, '%Y-%m-%d %H:%M:%S') %}
            {% set minutos = states('sensor.minutos_para_calentar_t1') | int(180) %}
            {{ (dt_reserva - timedelta(minutes=minutos)).strftime('%Y-%m-%d %H:%M:%S') }}
          {% else %}
            Sin reserva
          {% endif %}

      # --- Tinaja 2 ---
      - name: "Próxima Reserva T2 Horario"
        unique_id: proxima_reserva_t2_horario
        icon: mdi:hot-tub
        state: >
          {% set t2 = state_attr('sensor.reservas_tinajas', 'tinaja_2') %}
          {{ t2.horario if t2 else 'Sin reserva' }}

      - name: "Próxima Reserva T2 Cliente"
        unique_id: proxima_reserva_t2_cliente
        icon: mdi:account
        state: >
          {% set t2 = state_attr('sensor.reservas_tinajas', 'tinaja_2') %}
          {{ t2.cliente if t2 else '-' }}

      - name: "Próxima Reserva T2 Datetime"
        unique_id: proxima_reserva_t2_datetime
        state: >
          {% set t2 = state_attr('sensor.reservas_tinajas', 'tinaja_2') %}
          {{ t2.datetime_reserva if t2 else 'unknown' }}

      - name: "Minutos para calentar T2"
        unique_id: minutos_calentar_t2
        unit_of_measurement: "min"
        icon: mdi:timer-sand
        state: >
          {% set temp_actual   = states('sensor.sonoff_a4400425af_temperature') | float(12.5) %}
          {% set temp_objetivo = states('input_number.temperatura_objetivo_tinaja_1') | float(38) %}
          {% set min_por_grado = states('input_number.promedio_minutos_por_grado_tinaja_1') | float(7) %}
          {% set grados = [temp_objetivo - temp_actual, 0] | max %}
          {{ (grados * min_por_grado) | round(0) | int }}

      - name: "Hora encendido calculada T2"
        unique_id: hora_encendido_calculada_t2
        icon: mdi:clock-start
        state: >
          {% set t2 = state_attr('sensor.reservas_tinajas', 'tinaja_2') %}
          {% if t2 %}
            {% set dt_reserva = strptime(t2.datetime_reserva, '%Y-%m-%d %H:%M:%S') %}
            {% set minutos = states('sensor.minutos_para_calentar_t2') | int(180) %}
            {{ (dt_reserva - timedelta(minutes=minutos)).strftime('%Y-%m-%d %H:%M:%S') }}
          {% else %}
            Sin reserva
          {% endif %}


# ==============================================================================
# SECCIÓN 2 — Agrega en /config/automations.yaml
# ==============================================================================

# Entidades utilizadas:
#   switch.sonoff_100136b567_1  → Filtrado Tinaja 1
#   switch.sonoff_100136b567_2  → Calefacción Tinaja 1
#   switch.sonoff_100136bad0_1  → Filtrado Tinaja 2
#   switch.sonoff_100136bad0_2  → Calefacción Tinaja 2
#   sensor.sonoff_a440041249_temperature    → Temp interior T1 (15.3°C)
#   sensor.sonoff_a4400425af_temperature    → Temp interior T2 (12.5°C)
#   input_boolean.tinajas_control_activo    → Habilita encendido automático

- alias: "Tinajas | Actualizar hora encendido T1"
  id: tinajas_actualizar_encendido_t1
  description: >
    Recalcula y guarda la hora de encendido de calefacción T1 cuando
    cambia la reserva o la temperatura interior.
  trigger:
    - platform: state
      entity_id: sensor.reservas_tinajas
    - platform: state
      entity_id: sensor.minutos_para_calentar_t1
    - platform: time_pattern
      minutes: "/30"   # También recalcula cada 30 min por si cambió la temp
  condition:
    - condition: template
      value_template: >
        {{ state_attr('sensor.reservas_tinajas', 'tinaja_1') is not none
           and states('sensor.hora_encendido_calculada_t1') != 'Sin reserva' }}
  action:
    - service: input_datetime.set_datetime
      target:
        entity_id: input_datetime.encendido_tinaja_1
      data:
        datetime: "{{ states('sensor.hora_encendido_calculada_t1') }}"

- alias: "Tinajas | Actualizar hora encendido T2"
  id: tinajas_actualizar_encendido_t2
  description: >
    Recalcula y guarda la hora de encendido de calefacción T2 cuando
    cambia la reserva o la temperatura interior.
  trigger:
    - platform: state
      entity_id: sensor.reservas_tinajas
    - platform: state
      entity_id: sensor.minutos_para_calentar_t2
    - platform: time_pattern
      minutes: "/30"
  condition:
    - condition: template
      value_template: >
        {{ state_attr('sensor.reservas_tinajas', 'tinaja_2') is not none
           and states('sensor.hora_encendido_calculada_t2') != 'Sin reserva' }}
  action:
    - service: input_datetime.set_datetime
      target:
        entity_id: input_datetime.encendido_tinaja_2
      data:
        datetime: "{{ states('sensor.hora_encendido_calculada_t2') }}"

- alias: "Tinajas | Encender calefacción T1 automáticamente"
  id: tinajas_encender_calefaccion_t1
  description: >
    Enciende bomba de filtrado + calefacción de Tinaja 1 a la hora
    calculada (reserva - tiempo estimado de calentamiento).
    Solo actúa si el control automático está habilitado.
  trigger:
    - platform: time
      at: input_datetime.encendido_tinaja_1
  condition:
    - condition: state
      entity_id: input_boolean.tinajas_control_activo
      state: "on"
    - condition: template
      value_template: >
        {{ state_attr('sensor.reservas_tinajas', 'tinaja_1') is not none }}
    # No encender si ya está caliente
    - condition: template
      value_template: >
        {% set temp = states('sensor.sonoff_a440041249_temperature') | float(0) %}
        {% set objetivo = states('input_number.temperatura_objetivo_tinaja_1') | float(38) %}
        {{ temp < (objetivo - 3) }}
  action:
    - service: switch.turn_on
      target:
        entity_id:
          - switch.sonoff_100136b567_1   # Filtrado T1
          - switch.sonoff_100136b567_2   # Calefacción T1
    - service: persistent_notification.create
      data:
        title: "🔥 Tinaja 1 encendida"
        message: >
          Calefacción T1 encendida automáticamente.
          Reserva: {{ state_attr('sensor.reservas_tinajas', 'tinaja_1').horario }}
          Cliente: {{ state_attr('sensor.reservas_tinajas', 'tinaja_1').cliente }}
          Temp actual: {{ states('sensor.sonoff_a440041249_temperature') }}°C
          Minutos estimados: {{ states('sensor.minutos_para_calentar_t1') }} min
        notification_id: encendido_t1

