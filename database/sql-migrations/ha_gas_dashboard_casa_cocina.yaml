# ============================================================
# Home Assistant – Cards Gas Casa y Cocina (Tarea #14)
# ============================================================
# Agregar en el dashboard de HA mediante el editor de UI.
# Cada bloque es una card independiente.
# Requiere: custom:button-card y custom:mushroom-template-card
# ============================================================

# ── CARD: GAS CASA ───────────────────────────────────────────

type: vertical-stack
cards:

  - type: custom:mushroom-title-card
    title: Gas Casa y Cocina
    subtitle: Seguimiento por días · cilindros independientes

  - type: horizontal-stack
    cards:

      # ── CASA ──────────────────────────────────────────────
      - type: vertical-stack
        cards:

          - type: custom:button-card
            show_icon: false
            show_name: false
            show_state: false
            styles:
              card:
                - border-radius: 24px
                - padding: 20px
                - background: "linear-gradient(145deg, #111827, #020617)"
                - border: 1px solid rgba(255,255,255,0.08)
                - box-shadow: 0px 8px 24px rgba(0,0,0,0.3)
                - text-align: center
              grid:
                - grid-template-areas: '"content"'
                - grid-template-columns: 1fr
              custom_fields:
                content:
                  - width: 100%
            custom_fields:
              content: |
                [[[
                  const n = id => { const v = Number(states[id]?.state); return Number.isFinite(v) ? v : 0; };

                  const diasActual   = n('sensor.gas_casa_dias_en_uso_actual');
                  const diasAnterior = n('input_number.gas_casa_dias_ultimo_cilindro');
                  const promedio     = diasAnterior > 0 ? diasAnterior : 30;

                  const pct     = Math.min(100, Math.max(0, 100 - (diasActual / promedio * 100)));
                  const restante = pct.toFixed(0);

                  let color1 = '#22c55e', color2 = '#16a34a', glow = 'rgba(34,197,94,0.35)', label = 'Normal';
                  if (pct <= 5)       { color1 = '#ef4444'; color2 = '#991b1b'; glow = 'rgba(239,68,68,0.35)';   label = 'Crítico'; }
                  else if (pct <= 15) { color1 = '#f97316'; color2 = '#c2410c'; glow = 'rgba(249,115,22,0.35)';  label = 'Pedir gas'; }
                  else if (pct <= 30) { color1 = '#facc15'; color2 = '#ca8a04'; glow = 'rgba(250,204,21,0.35)';  label = 'Bajo'; }
                  else if (pct <= 60) { color1 = '#38bdf8'; color2 = '#0284c7'; glow = 'rgba(56,189,248,0.35)';  label = 'Medio'; }

                  const item = (lbl, val, clr) => `
                    <div style="background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);
                      border-radius:14px;padding:10px 8px;display:flex;flex-direction:column;
                      align-items:center;text-align:center;">
                      <div style="font-size:12px;color:#94a3b8;font-weight:700;">${lbl}</div>
                      <div style="font-size:22px;font-weight:900;color:${clr};margin-top:3px;">${val}</div>
                    </div>`;

                  return `
                    <div style="width:100%">
                      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
                        <div style="font-size:22px;font-weight:900;color:#f8fafc;">Gas Casa</div>
                        <div style="padding:6px 12px;border-radius:999px;background:${color1}22;
                          color:${color1};font-size:12px;font-weight:900;">${label}</div>
                      </div>

                      <div style="display:flex;gap:16px;align-items:center;margin-bottom:18px;">
                        <div style="width:120px;height:120px;border-radius:28px;background:#020617;
                          border:1px solid rgba(255,255,255,0.12);box-shadow:0 0 28px ${glow};
                          position:relative;overflow:hidden;flex-shrink:0;">
                          <div style="position:absolute;bottom:0;left:0;right:0;height:${restante}%;
                            background:linear-gradient(180deg,${color1},${color2});transition:height .8s ease;"></div>
                          <div style="position:absolute;inset:0;display:flex;flex-direction:column;
                            align-items:center;justify-content:center;text-shadow:0 2px 6px rgba(0,0,0,0.5);">
                            <ha-icon icon="mdi:gas-cylinder" style="width:32px;height:32px;color:white;"></ha-icon>
                            <div style="font-size:28px;font-weight:900;color:white;line-height:1;">${restante}%</div>
                          </div>
                        </div>
                        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;flex:1;">
                          ${item('Días en uso', diasActual + ' días', '#f8fafc')}
                          ${item('Duración est.', promedio + ' días', '#c084fc')}
                          ${item('Último cilindro', diasAnterior > 0 ? diasAnterior + ' días' : 'Sin dato', '#60a5fa')}
                          ${item('Restante', restante + '%', color1)}
                        </div>
                      </div>
                    </div>`;
                ]]]

          - type: custom:mushroom-template-card
            entity: input_button.gas_nuevo_casa
            primary: Gas nuevo – Casa
            secondary: >
              Último cilindro: {{ states('input_number.gas_casa_dias_ultimo_cilindro') | int }} días
            icon: mdi:propane-tank
            icon_color: orange
            layout: horizontal
            tap_action:
              action: call-service
              service: input_button.press
              target:
                entity_id: input_button.gas_nuevo_casa

      # ── COCINA ────────────────────────────────────────────
