# ============================================================
# Home Assistant — Sensores y helpers para control de gas
# Archivo: home_assistant_gas_sensores.yaml
# ============================================================
# Pegar en configuration.yaml o incluir con:
#   template: !include home_assistant_gas_sensores.yaml
# ============================================================

# ── HELPERS (input_datetime) ──────────────────────────────────
# Guardan la fecha de instalación actual y anterior de cada lugar.
# Crear en HA → Configuración → Helpers → Fecha/hora

input_datetime:
  # Gas Casa
  gas_casa_fecha_actual:
    name: "Gas Casa – fecha instalación actual"
    has_date: true
    has_time: true
  gas_casa_fecha_anterior:
    name: "Gas Casa – fecha instalación anterior"
    has_date: true
    has_time: true

  # Gas Cocina
  gas_cocina_fecha_actual:
    name: "Gas Cocina – fecha instalación actual"
    has_date: true
    has_time: true
  gas_cocina_fecha_anterior:
    name: "Gas Cocina – fecha instalación anterior"
    has_date: true
    has_time: true

# ── HELPERS (input_number) ────────────────────────────────────
# Guardan días que duró el cilindro anterior.

input_number:
  gas_casa_dias_ultimo_cilindro:
    name: "Gas Casa – días cilindro anterior"
    min: 0
    max: 365
    step: 1
    unit_of_measurement: "días"

  gas_cocina_dias_ultimo_cilindro:
    name: "Gas Cocina – días cilindro anterior"
    min: 0
    max: 365
    step: 1
    unit_of_measurement: "días"

  # Contadores de horas para tinajas (se resetean a 0 con input_button)
  horas_gas_tinaja_1:
    name: "Tinaja 1 – horas de uso"
    min: 0
    max: 10000
    step: 0.1
    unit_of_measurement: "h"

  horas_gas_tinaja_2:
    name: "Tinaja 2 – horas de uso"
    min: 0
    max: 10000
    step: 0.1
    unit_of_measurement: "h"

# ── HELPERS (input_button) ────────────────────────────────────
# Botones para resetear contadores de tinajas.

input_button:
  gas_nuevo_tinaja_1:
    name: "Gas nuevo – Tinaja 1"
    icon: mdi:propane-tank

  gas_nuevo_tinaja_2:
    name: "Gas nuevo – Tinaja 2"
    icon: mdi:propane-tank

# ── SENSORES TEMPLATE ─────────────────────────────────────────
# Calculan días en uso actual para Casa y Cocina.

template:
  - sensor:
      - name: "Gas Casa – días en uso actual"
        unique_id: gas_casa_dias_en_uso_actual
        unit_of_measurement: "días"
        icon: mdi:calendar-clock
        state: >
          {% set f = states('input_datetime.gas_casa_fecha_actual') %}
          {% if f not in ['unknown', 'unavailable', '', none] %}
            {{ ((as_timestamp(now()) - as_timestamp(f)) / 86400) | round(0) }}
          {% else %}
            0
          {% endif %}

      - name: "Gas Cocina – días en uso actual"
        unique_id: gas_cocina_dias_en_uso_actual
        unit_of_measurement: "días"
        icon: mdi:calendar-clock
        state: >
          {% set f = states('input_datetime.gas_cocina_fecha_actual') %}
          {% if f not in ['unknown', 'unavailable', '', none] %}
            {{ ((as_timestamp(now()) - as_timestamp(f)) / 86400) | round(0) }}
          {% else %}
            0
          {% endif %}

      - name: "Gas Casa – días cilindro anterior"
        unique_id: gas_casa_dias_cilindro_anterior
        unit_of_measurement: "días"
        icon: mdi:history
        state: >
          {% set fa = states('input_datetime.gas_casa_fecha_anterior') %}
          {% set fc = states('input_datetime.gas_casa_fecha_actual') %}
          {% if fa not in ['unknown','unavailable','',none] and fc not in ['unknown','unavailable','',none] %}
            {{ ((as_timestamp(fc) - as_timestamp(fa)) / 86400) | round(0) }}
          {% else %}
            0
          {% endif %}

      - name: "Gas Cocina – días cilindro anterior"
        unique_id: gas_cocina_dias_cilindro_anterior
        unit_of_measurement: "días"
        icon: mdi:history
        state: >
          {% set fa = states('input_datetime.gas_cocina_fecha_anterior') %}
          {% set fc = states('input_datetime.gas_cocina_fecha_actual') %}
          {% if fa not in ['unknown','unavailable','',none] and fc not in ['unknown','unavailable','',none] %}
            {{ ((as_timestamp(fc) - as_timestamp(fa)) / 86400) | round(0) }}
          {% else %}
            0
          {% endif %}

# ── AUTOMATIZACIONES ──────────────────────────────────────────
# Cuando se presiona el botón de gas nuevo en tinajas:
#   1. Llama a la API para registrar la instalación
#   2. Resetea el contador de horas

automation:
  # --- Tinaja 1 ---
  - alias: "Gas nuevo Tinaja 1 – registrar y resetear"
    id: gas_nuevo_tinaja_1_registrar
    trigger:
      - platform: state
        entity_id: input_button.gas_nuevo_tinaja_1
    action:
      # 1. Registrar instalación en la API
      - service: rest_command.registrar_instalacion_gas
        data:
          lugar: "tinaja_1"
          fecha_instalacion: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
          contador_valor: "{{ states('input_number.horas_gas_tinaja_1') }}"
          contador_unidad: "horas"
      # 2. Resetear contador de horas
      - service: input_number.set_value
        target:
          entity_id: input_number.horas_gas_tinaja_1
        data:
          value: 0

  # --- Tinaja 2 ---
  - alias: "Gas nuevo Tinaja 2 – registrar y resetear"
    id: gas_nuevo_tinaja_2_registrar
    trigger:
      - platform: state
        entity_id: input_button.gas_nuevo_tinaja_2
    action:
      - service: rest_command.registrar_instalacion_gas
        data:
          lugar: "tinaja_2"
          fecha_instalacion: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
          contador_valor: "{{ states('input_number.horas_gas_tinaja_2') }}"
          contador_unidad: "horas"
      - service: input_number.set_value
        target:
          entity_id: input_number.horas_gas_tinaja_2
        data:
          value: 0

  # --- Gas Casa ---
  - alias: "Gas nuevo Casa – registrar y actualizar fechas"
    id: gas_nuevo_casa_registrar
    trigger:
      - platform: webhook
        webhook_id: gas_nuevo_casa   # Llamar desde HA o botón físico
    action:
      # 1. Copiar fecha actual → fecha anterior
      - service: input_datetime.set_datetime
        target:
          entity_id: input_datetime.gas_casa_fecha_anterior
        data:
          datetime: "{{ states('input_datetime.gas_casa_fecha_actual') }}"
      # 2. Guardar días que duró el cilindro anterior
      - service: input_number.set_value
        target:
          entity_id: input_number.gas_casa_dias_ultimo_cilindro
        data:
          value: "{{ states('sensor.gas_casa_dias_en_uso_actual') | int }}"
      # 3. Registrar nueva fecha
      - service: input_datetime.set_datetime
        target:
          entity_id: input_datetime.gas_casa_fecha_actual
        data:
          datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
      # 4. Llamar a la API
      - service: rest_command.registrar_instalacion_gas
        data:
          lugar: "gas_casa"
          fecha_instalacion: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
          contador_valor: "{{ states('sensor.gas_casa_dias_en_uso_actual') }}"
          contador_unidad: "dias"

  # --- Gas Cocina ---
  - alias: "Gas nuevo Cocina – registrar y actualizar fechas"
    id: gas_nuevo_cocina_registrar
    trigger:
      - platform: webhook
        webhook_id: gas_nuevo_cocina
    action:
      - service: input_datetime.set_datetime
        target:
          entity_id: input_datetime.gas_cocina_fecha_anterior
        data:
          datetime: "{{ states('input_datetime.gas_cocina_fecha_actual') }}"
      - service: input_number.set_value
        target:
          entity_id: input_number.gas_cocina_dias_ultimo_cilindro
        data:
          value: "{{ states('sensor.gas_cocina_dias_en_uso_actual') | int }}"
      - service: input_datetime.set_datetime
        target:
          entity_id: input_datetime.gas_cocina_fecha_actual
        data:
          datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
      - service: rest_command.registrar_instalacion_gas
        data:
          lugar: "gas_cocina"
          fecha_instalacion: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
          contador_valor: "{{ states('sensor.gas_cocina_dias_en_uso_actual') }}"
          contador_unidad: "dias"

# ── REST COMMANDS ─────────────────────────────────────────────
# Comandos para llamar a la API de botacura desde HA.
# Cambiar la URL al dominio de producción antes de usar.

rest_command:
  registrar_instalacion_gas:
    url: "https://app.botacura.cl/api/iot/gas/registrar"
    method: POST
    headers:
      Content-Type: "application/json"
      # Agregar token de autenticación si se implementa
      # Authorization: "Bearer {{ token }}"
    payload: >
      {
        "tipo_operacion": "instalacion_cilindro",
        "lugar": "{{ lugar }}",
        "fecha_instalacion": "{{ fecha_instalacion }}",
        "contador_valor": {{ contador_valor | default(0) }},
        "contador_unidad": "{{ contador_unidad | default('') }}"
      }

  registrar_compra_gas:
    url: "https://app.botacura.cl/api/iot/gas/registrar"
    method: POST
    headers:
      Content-Type: "application/json"
    payload: >
      {
        "tipo_operacion": "pago_proveedor",
        "proveedor": "{{ proveedor }}",
        "fecha_compra": "{{ fecha_compra }}",
        "valor_cilindro": {{ valor_cilindro }},
        "cantidad_cilindros": {{ cantidad_cilindros | default(1) }},
        "kg_cilindro": {{ kg_cilindro | default(0) }}
      }
