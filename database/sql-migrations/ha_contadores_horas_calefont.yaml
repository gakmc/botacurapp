# ============================================================
# Home Assistant – Contadores de horas de encendido calefont
# ============================================================
# Tarea #14 – Sistema gestión gas multi-sector
#
# LÓGICA:
#   tinaja_1 / tinaja_2 → cuentan HORAS DE COMBUSTIÓN REAL
#     El calefont se considera encendido cuando la temperatura
#     de salida (sensor sonoff) sube más de UMBRAL_DELTA grados
#     respecto a la lectura anterior (cada minuto).
#     Esto descarta el calor pasivo del agua ya caliente.
#
#   gas_casa / gas_cocina → cuentan DÍAS (entre instalaciones)
#     Ver home_assistant_gas_sensores.yaml para esos sensores.
#
# SENSORES FÍSICOS:
#   Tinaja 1: sensor.sonoff_10012a25d8_temperature (salida calefont T1)
#   Tinaja 2: sensor.sonoff_10012a3d29_temperature  (salida calefont T2)
#
# HELPERS REQUERIDOS (crear en HA → Configuración → Helpers):
#   input_number.temp_salida_anterior_calefont_tinaja_1  (min -10 max 100 step 0.1 °C)
#   input_number.temp_salida_anterior_calefont_tinaja_2  (min -10 max 100 step 0.1 °C)
#   input_number.horas_gas_tinaja_1  → ya definido en home_assistant_gas_sensores.yaml
#   input_number.horas_gas_tinaja_2  → ya definido en home_assistant_gas_sensores.yaml
#
# INSTRUCCIONES:
#   1. Copia los input_number nuevos en configuration.yaml
#   2. Copia las automations en automations.yaml
#   3. Reinicia HA
# ============================================================

# ── HELPERS: temperatura anterior (referencia para detectar variación) ─────

input_number:
  temp_salida_anterior_calefont_tinaja_1:
    name: "Tinaja 1 – Temp anterior salida calefont"
    min: -10
    max: 100
    step: 0.1
    unit_of_measurement: "°C"
    icon: mdi:thermometer-chevron-up

  temp_salida_anterior_calefont_tinaja_2:
    name: "Tinaja 2 – Temp anterior salida calefont"
    min: -10
    max: 100
    step: 0.1
    unit_of_measurement: "°C"
    icon: mdi:thermometer-chevron-up

# ── UMBRAL DE TEMPERATURA ─────────────────────────────────────────────────
# El calefont se considera ENCENDIDO cuando la temperatura de salida supera
# UMBRAL_CALEFONT_ON grados. Ajusta este valor según tu instalación:
#   - Calefont apagado: temperatura ≈ temperatura del agua acumulada (~25–35°C)
#   - Calefont encendido: temperatura sube a ≈ 45–65°C
# Usa 38°C como punto de corte por defecto (edítalo en el input_number de HA).
#
# Ventaja vs. delta: funciona aunque el calefont lleve horas encendido
# (temperatura estabilizada). El delta solo captura el momento de encendido.

input_number:
  umbral_calefont_encendido_tinaja_1:
    name: "Tinaja 1 – Umbral temp. calefont encendido"
    min: 20
    max: 80
    step: 0.5
    unit_of_measurement: "°C"
    icon: mdi:thermometer-alert
    initial: 38

  umbral_calefont_encendido_tinaja_2:
    name: "Tinaja 2 – Umbral temp. calefont encendido"
    min: 20
    max: 80
    step: 0.5
    unit_of_measurement: "°C"
    icon: mdi:thermometer-alert
    initial: 38

# ── AUTOMATIONS ───────────────────────────────────────────────────────────

automation:

  # ── TINAJA 1: incrementar horas de calefont cada minuto ──────────────────
  - alias: "Gas Tinaja 1 – Contar horas encendido calefont"
    id: gas_tinaja_1_contar_horas_calefont
    description: >
      Cada minuto verifica si la temperatura de salida del calefont (sonoff_10012a25d8)
      supera el umbral configurado. Si sí → calefont encendido → suma 1/60 hora.
      Usa umbral absoluto (no delta) para detectar encendido estabilizado también.
    mode: single
    max_exceeded: silent
    trigger:
      - platform: time_pattern
        minutes: "/1"
    action:
      - variables:
          temp_actual:  "{{ states('sensor.sonoff_10012a25d8_temperature') | float(0) }}"
          umbral:       "{{ states('input_number.umbral_calefont_encendido_tinaja_1') | float(38) }}"
          horas_actual: "{{ states('input_number.horas_gas_tinaja_1') | float(0) }}"

      # Sumar 1 minuto (= 1/60 hora) a TOTAL y DIARIO si calefont encendido
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ temp_actual > umbral }}"
            sequence:
              # Acumulado total del cilindro (solo resetea al cambiar cilindro)
              - service: input_number.set_value
                target:
                  entity_id: input_number.horas_gas_tinaja_1
                data:
                  value: "{{ [horas_actual + (1/60), 10000] | min | round(2) }}"
              # Contador diario (resetea a medianoche)
              - service: input_number.set_value
                target:
                  entity_id: input_number.horas_gas_tinaja_1_dia
                data:
                  value: >
                    {{ [states('input_number.horas_gas_tinaja_1_dia') | float(0) + (1/60), 24] | min | round(2) }}

  # ── TINAJA 2: incrementar horas de calefont cada minuto ──────────────────
  - alias: "Gas Tinaja 2 – Contar horas encendido calefont"
    id: gas_tinaja_2_contar_horas_calefont
    description: