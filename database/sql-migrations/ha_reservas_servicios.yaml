# ==============================================================================
# HOME ASSISTANT — Próximas reservas Servicios (Sauna · Masajes)
# ==============================================================================
# Generado por BotacurApp — 2026-06-28
#
# INSTRUCCIONES:
# 1. Agrega el bloque `rest:` en /config/configuration.yaml
#    (justo después del bloque rest: existente del sensor de tinajas,
#     o añade otro item a la misma lista si ya existe)
# 2. Agrega el bloque `template:` en /config/configuration.yaml
# 3. En HA: Configuración → Sistema → Reiniciar HA
#
# ENDPOINT:
#   GET https://app.botacura.cl/api/iot/servicios/proximas-reservas
#   (Disponible en producción tras merge de feature/proveedores-egresos-mejoras)
#
# Para pruebas locales antes del merge, reemplaza la URL por:
#   http://TU_IP_WINDOWS/proyectos/botacurapp/public/api/iot/servicios/proximas-reservas
# ==============================================================================


# ==============================================================================
# SECCIÓN 1 — Agrega en /config/configuration.yaml (bloque rest:)
# ==============================================================================

rest:
  # Agrega este item a la lista rest: existente (mismo nivel que el de tinajas)
  - resource: "https://app.botacura.cl/api/iot/servicios/proximas-reservas"
    scan_interval: 300    # cada 5 minutos
    sensor:
      - name: "Reservas Servicios"
        unique_id: reservas_servicios_api
        value_template: "{{ value_json.ok }}"
        json_attributes:
          - sauna
          - masaje_container
          - masaje_palmeras
          - consultado_en


# ==============================================================================
# SECCIÓN 2 — Agrega en /config/configuration.yaml (bloque template:)
# ==============================================================================

template:
  - sensor:
      # ── Sauna ─────────────────────────────────────────────────────────────
      - name: "Sauna Próxima Reserva Horario"
        unique_id: sauna_proxima_reserva_horario
        icon: mdi:fire
        state: >
          {% set s = state_attr('sensor.reservas_servicios', 'sauna') %}
          {{ s.horario if s else 'Sin reserva' }}

      - name: "Sauna Próxima Reserva Cliente"
        unique_id: sauna_proxima_reserva_cliente
        icon: mdi:account
        state: >
          {% set s = state_attr('sensor.reservas_servicios', 'sauna') %}
          {{ s.cliente if s else '-' }}

      - name: "Sauna Próxima Reserva Fecha"
        unique_id: sauna_proxima_reserva_fecha
        icon: mdi:calendar
        state: >
          {% set s = state_attr('sensor.reservas_servicios', 'sauna') %}
          {{ s.fecha_visita if s else 'unknown' }}

      # ── Masaje Container ───────────────────────────────────────────────────
      - name: "Masaje Container Próxima Reserva Horario"
        unique_id: masaje_container_proxima_reserva_horario
        icon: mdi:hand-wave
        state: >
          {% set m = state_attr('sensor.reservas_servicios', 'masaje_container') %}
          {{ m.horario if m else 'Sin reserva' }}

      - name: "Masaje Container Próxima Reserva Cliente"
        unique_id: masaje_container_proxima_reserva_cliente
        icon: mdi:account
        state: >
          {% set m = state_attr('sensor.reservas_servicios', 'masaje_container') %}
          {{ m.cliente if m else '-' }}

      # ── Masaje Palmeras ────────────────────────────────────────────────────
      - name: "Masaje Palmeras Próxima Reserva Horario"
        unique_id: masaje_palmeras_proxima_reserva_horario
        icon: mdi:hand-wave
        state: >
          {% set m = state_attr('sensor.reservas_servicios', 'masaje_palmeras') %}
          {{ m.horario if m else 'Sin reserva' }}

      - name: "Masaje Palmeras Próxima Reserva Cliente"
        unique_id: masaje_palmeras_proxima_reserva_cliente
        icon: mdi:account
        state: >
          {% set m = state_attr('sensor.reservas_servicios', 'masaje_palmeras') %}
          {{ m.cliente if m else '-' }}
