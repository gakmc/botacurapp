    - type: grid
      title: "🧖 Sauna"
      cards:
      - type: custom:button-card
        show_icon: false
        show_name: false
        show_state: false
        tap_action:
          action: more-info
        styles:
          grid:
            - grid-template-areas: '"icon info temp light"'
            - grid-template-columns: 54px 1fr auto 54px
            - align-items: center
            - column-gap: 14px
          card:
            - border-radius: 18px
            - padding: 16px
            - box-shadow: none
            - background: |
                [[[
                  const t = Number(states['sensor.sonoff_100262ced8_temperature']?.state || 0);
                  const luz = states['switch.sonoff_100262ced8']?.state === 'on';
                  if (t >= 95) return luz ? '#f4b4b4' : '#f7c7c7';
                  if (t >= 80) return luz ? '#ffc98f' : '#ffd8b5';
                  if (t >= 60) return luz ? '#facc15' : '#ffe8a3';
                  if (t >= 35) return luz ? '#a5e8ff' : '#d6f5ff';
                  return luz ? '#93dfff' : '#cdefff';
                ]]]
          custom_fields:
            icon:
              - justify-self: center
              - align-self: center
            info:
              - justify-self: start
              - align-self: center
            temp:
              - justify-self: end
              - align-self: center
            light:
              - justify-self: end
              - align-self: center
        custom_fields:
          icon: |
            [[[
              const t = Number(states['sensor.sonoff_100262ced8_temperature']?.state || 0);
              let icon = 'mdi:snowflake-thermometer', color = '#0284c7';
              if (t >= 35 && t < 60) {{ icon = 'mdi:thermometer'; color = '#0891b2'; }}
              else if (t >= 60 && t < 80) {{ icon = 'mdi:thermometer-chevron-up'; color = '#ca8a04'; }}
              else if (t >= 80 && t < 95) {{ icon = 'mdi:sauna'; color = '#ea580c'; }}
              else if (t >= 95) {{ icon = 'mdi:thermometer-alert'; color = '#dc2626'; }}
              return `<div style="width:42px;height:42px;border-radius:50%;background:${{color}};display:flex;align-items:center;justify-content:center;color:white;"><ha-icon icon="${{icon}}" style="width:24px;height:24px;"></ha-icon></div>`;
            ]]]
